baseURL = "https://docs.cli.vulnetix.com/"
languageCode = "en-us"
title = "Vulnetix"

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[[menu.main]]
  name = "Docs"
  pageRef = "/docs"
  weight = 1

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/Vulnetix/cli"
  weight = 5
  [menu.main.params]
    icon = "github"

[[menu.main]]
  name = "API Docs"
  url = "https://redocly.github.io/redoc/?url=https://api.vdb.vulnetix.com/v1/spec"
  weight = 6
  [menu.main.params]
    icon = "book-open"

[[menu.main]]
  name = "API Spec"
  url = "https://api.vdb.vulnetix.com/v1/spec"
  weight = 7
  [menu.main.params]
    icon = "document-download"

[[menu.main]]
  name = "Sign In"
  url = "https://app.vulnetix.com/login"
  weight = 8
  [menu.main.params]
    icon = "login"

[params]
  description = "Automated vulnerability management CLI that focuses on remediation over discovery."
  images = ["https://www.vulnetix.com/images/og.png"]

  [params.social]

  [params.navbar]
    displayTitle = true
    displayLogo = true

    [params.navbar.logo]
      path = "favicon-32x32.png"
      dark = "favicon-32x32.png"
      width = "24"
      height = "24"

  [params.footer]
    displayPoweredBy = false

  [params.editURL]
    enable = true
    base = "https://github.com/Vulnetix/cli/edit/main/website/content"
