name: Auto Version

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  auto-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Find the latest version tag
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          echo "Last tag: $LAST_TAG"

          # Parse current version
          CURRENT="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commit messages for conventional commits
          BUMP=""
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE:'; then
              BUMP="major"
              break
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            elif echo "$msg" | grep -qE '^(fix|chore|perf|refactor|style|docs|test|build|ci)(\(.+\))?:'; then
              if [ -z "$BUMP" ]; then
                BUMP="patch"
              fi
            fi
          done < <(git log "$RANGE" --format="%s" 2>/dev/null)

          if [ -z "$BUMP" ]; then
            echo "No conventional commits found since $LAST_TAG, skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP -> $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          git tag -a "${{ steps.bump.outputs.new_version }}" -m "Release ${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.new_version }}"

      # Tags pushed by GITHUB_TOKEN don't trigger other workflows,
      # so we explicitly dispatch the release workflow
      - name: Trigger release workflow
        if: steps.bump.outputs.skip != 'true'
        run: |
          gh workflow run release.yml \
            --field version=${{ steps.bump.outputs.new_version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
