name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install zig (C cross-compiler for CGO targets)
        run: |
          ZIG_VER="0.13.0"
          curl -sSL "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          sudo mv /tmp/zig-linux-x86_64-${ZIG_VER} /opt/zig
          sudo ln -sf /opt/zig/zig /usr/local/bin/zig
          zig version

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION"

      - name: Build release binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/vulnetix/cli/cmd.version=${VERSION} -X github.com/vulnetix/cli/cmd.commit=${COMMIT} -X github.com/vulnetix/cli/cmd.buildDate=${BUILD_DATE}"
          mkdir -p bin

          # CGO is required for the bundled tree-sitter grammars used by the
          # reachability analyser. zig cc cross-compiles the C grammar source
          # for every supported (GOOS, GOARCH) target.
          build_target() {
            local goos="$1" goarch="$2" triple="$3" suffix="$4"
            echo "Building ${goos}/${goarch} (${triple})..."
            CGO_ENABLED=1 \
              CC="zig cc -target ${triple}" \
              CXX="zig c++ -target ${triple}" \
              GOOS="${goos}" GOARCH="${goarch}" \
              go build -ldflags "$LDFLAGS" \
              -o bin/vulnetix-${goos}-${goarch}${suffix} .
          }

          build_target linux   amd64 x86_64-linux-musl     ""
          build_target linux   arm64 aarch64-linux-musl    ""
          build_target linux   arm   arm-linux-musleabihf  ""
          build_target linux   386   i386-linux-musl       ""
          build_target darwin  amd64 x86_64-macos          ""
          build_target darwin  arm64 aarch64-macos         ""
          build_target windows amd64 x86_64-windows-gnu    ".exe"
          build_target windows arm64 aarch64-windows-gnu   ".exe"

          # windows/arm and windows/386 dropped — zig cc + CGO is unstable
          # for these triples. Scoop's 32-bit/arm slots remain in the manifest
          # update step but pull the most recent successful builds.

      - name: Copy install script
        run: cp install.sh bin/install.sh

      - name: Generate checksums
        run: |
          cd bin
          sha256sum * > checksums.txt

      - name: Create or update Release
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Ensure tag exists for the release
          if ! git tag -l "$VERSION" | grep -q "$VERSION"; then
            git tag -a "$VERSION" -m "Release $VERSION"
          fi
          if gh release view "$VERSION" > /dev/null 2>&1; then
            gh release upload "$VERSION" bin/* --clobber
          else
            gh release create "$VERSION" bin/* \
              --title "Release $VERSION" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  test-go-install:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test go install
        run: |
          sleep 30
          go install github.com/vulnetix/cli@latest
          vulnetix --help || echo "Binary not found in PATH"

      - name: Test specific version install
        run: |
          VERSION=${{ needs.release.outputs.version }}
          go install github.com/vulnetix/cli@${VERSION}
          vulnetix version --short || echo "Version command failed"

  update-packages:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cli repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGES_TOKEN }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Vulnetix/homebrew-tap
          token: ${{ secrets.PACKAGES_TOKEN }}
          path: homebrew-tap

      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: Vulnetix/scoop-bucket
          token: ${{ secrets.PACKAGES_TOKEN }}
          path: scoop-bucket

      - name: Download checksums
        run: gh release download "${{ needs.release.outputs.version }}" --pattern checksums.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update flake.nix
        run: |
          VER_NUM="${{ needs.release.outputs.version }}"
          VER_NUM="${VER_NUM#v}"
          git checkout main
          sed -i "s/version = \"[^\"]*\";/version = \"${VER_NUM}\";/" flake.nix
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          if ! git diff --cached --quiet; then
            git commit -m "chore: update flake.nix to v${VER_NUM} [skip ci]"
            git push origin main
          fi

      - name: Update Homebrew formula
        run: |
          VER_NUM="${{ needs.release.outputs.version }}"
          VER_NUM="${VER_NUM#v}"
          hash_for() { grep "$1\$" checksums.txt | awk '{print $1}'; }
          DARWIN_ARM64=$(hash_for vulnetix-darwin-arm64)
          DARWIN_AMD64=$(hash_for vulnetix-darwin-amd64)
          LINUX_ARM64=$(hash_for vulnetix-linux-arm64)
          LINUX_AMD64=$(hash_for vulnetix-linux-amd64)

          cd homebrew-tap
          BREW="Formula/vulnetix.rb"
          sed -i "s/version \"[^\"]*\"/version \"${VER_NUM}\"/" "$BREW"
          sed -i "/vulnetix-darwin-arm64/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${DARWIN_ARM64}\"/}" "$BREW"
          sed -i "/vulnetix-darwin-amd64/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${DARWIN_AMD64}\"/}" "$BREW"
          sed -i "/vulnetix-linux-arm64/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${LINUX_ARM64}\"/}" "$BREW"
          sed -i "/vulnetix-linux-amd64/{n;s/sha256 \"[a-f0-9]*\"/sha256 \"${LINUX_AMD64}\"/}" "$BREW"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BREW"
          if ! git diff --cached --quiet; then
            git commit -m "vulnetix ${VER_NUM}"
            git push
          fi

      - name: Update Scoop manifest
        run: |
          VER_NUM="${{ needs.release.outputs.version }}"
          VER_NUM="${VER_NUM#v}"
          hash_for() { grep "$1\$" checksums.txt | awk '{print $1}'; }
          WIN_AMD64=$(hash_for vulnetix-windows-amd64.exe)
          WIN_ARM64=$(hash_for vulnetix-windows-arm64.exe)

          cd scoop-bucket
          if [ -f bucket/vulnetix.json ]; then
            # 32-bit Windows builds were dropped when CGO became a build
            # requirement (zig cc + CGO is unstable for i386-windows).
            # Remove the 32bit architecture entry from the manifest.
            jq --indent 4 \
              --arg v "$VER_NUM" \
              --arg h64 "$WIN_AMD64" \
              --arg harm "$WIN_ARM64" \
              '.version = $v |
               .architecture."64bit".url = "https://github.com/Vulnetix/cli/releases/download/v\($v)/vulnetix-windows-amd64.exe#/vulnetix.exe" |
               .architecture."64bit".hash = $h64 |
               .architecture.arm64.url = "https://github.com/Vulnetix/cli/releases/download/v\($v)/vulnetix-windows-arm64.exe#/vulnetix.exe" |
               .architecture.arm64.hash = $harm |
               del(.architecture."32bit")' bucket/vulnetix.json > /tmp/vulnetix.json
            mv /tmp/vulnetix.json bucket/vulnetix.json

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bucket/vulnetix.json
            if ! git diff --cached --quiet; then
              git commit -m "vulnetix ${VER_NUM}"
              git push
            fi
          fi
