spec:
  inputs:
    publish_stage:
      default: publish
      description: Stage that uploads artifacts to the generic package registry.
    release_stage:
      default: release
      description: Stage that creates the GitLab Release.
    package_name:
      default: vulnetix-artifacts
      description: Generic package registry package name.
    artifact_dir:
      default: dist
      description: Directory holding the artifacts produced by earlier jobs.
    needs_job:
      default: vulnetix-scan
      description: Job whose artifacts are downloaded before publishing.
---
# release:assets:links takes a URL, never a local path. Artifacts must be
# addressable before the release can reference them, so they are pushed to the
# generic package registry first.
vulnetix-publish:
  stage: $[[ inputs.publish_stage ]]
  image: alpine:3.20
  variables:
    PACKAGE_NAME: $[[ inputs.package_name ]]
    ARTIFACT_DIR: $[[ inputs.artifact_dir ]]
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: $[[ inputs.needs_job ]]
      artifacts: true
  before_script:
    - apk add --no-cache curl ca-certificates
  script:
    - |
      for f in "$ARTIFACT_DIR"/*; do
        [ -e "$f" ] || continue
        echo "Publishing $(basename "$f")"
        curl --fail-with-body --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/$(basename "$f")"
      done

# release-cli is deprecated as of GitLab 18.0 (removal planned for 20.0).
# The glab image is the supported replacement.
vulnetix-release:
  stage: $[[ inputs.release_stage ]]
  image: registry.gitlab.com/gitlab-org/cli:latest
  variables:
    PACKAGE_NAME: $[[ inputs.package_name ]]
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: vulnetix-publish
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Security artifacts for $CI_COMMIT_TAG."
    assets:
      links:
        - name: sbom.cdx.json
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/sbom.cdx.json"
          link_type: package
