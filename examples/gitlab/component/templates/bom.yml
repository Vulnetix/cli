spec:
  inputs:
    stage:
      default: test
      description: Pipeline stage the BOM jobs run in.
    version:
      default: v3.59.4
      description: Vulnetix CLI release to install. Pin an exact tag.
    path:
      default: .
      description: Directory to scan.
    image:
      default: alpine:3.20
      description: Base image the jobs run in.
    cbom:
      default: 'true'
      options: ['true', 'false']
      description: Emit a Cryptography Bill of Materials.
    aibom:
      default: 'true'
      options: ['true', 'false']
      description: Emit an AI Bill of Materials.
    fail_on:
      default: none
      options: [none, quantum-vulnerable, deprecated]
      description: cbom only. Exit non-zero when crypto of this PQC status is found.
---
# An input is interpolated as a whole value, never spliced into a larger
# string, so it is assigned to a variable and the rule tests the variable.
vulnetix-cbom:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    VULNETIX_VERSION: $[[ inputs.version ]]
    VULNETIX_PATH: $[[ inputs.path ]]
    VULNETIX_FAIL_ON: $[[ inputs.fail_on ]]
    VULNETIX_CBOM_ENABLED: $[[ inputs.cbom ]]
  rules:
    - if: $VULNETIX_CBOM_ENABLED == "true"
  before_script:
    - apk add --no-cache bash ca-certificates curl tar || true
    - curl -fsSL https://cli.vulnetix.com/install.sh | sh -s -- --install-dir /usr/local/bin --version "$VULNETIX_VERSION"
    - vulnetix auth verify
    - mkdir -p dist
  script:
    - vulnetix cbom --path "$VULNETIX_PATH" --output-file dist/cbom.cdx.json --fail-on "$VULNETIX_FAIL_ON"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/cbom.cdx.json

vulnetix-aibom:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    VULNETIX_VERSION: $[[ inputs.version ]]
    VULNETIX_PATH: $[[ inputs.path ]]
    VULNETIX_AIBOM_ENABLED: $[[ inputs.aibom ]]
  rules:
    - if: $VULNETIX_AIBOM_ENABLED == "true"
  before_script:
    - apk add --no-cache bash ca-certificates curl tar || true
    - curl -fsSL https://cli.vulnetix.com/install.sh | sh -s -- --install-dir /usr/local/bin --version "$VULNETIX_VERSION"
    - vulnetix auth verify
    - mkdir -p dist
  script:
    - vulnetix aibom --path "$VULNETIX_PATH" --output-file dist/aibom.cdx.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/aibom.cdx.json
