# CI for the component project itself.
#
# A component project must lint its own templates and prove they resolve,
# then publish to the CI/CD Catalog on tag.

stages:
  - test
  - release

# Resolve every template with its defaults. If an input is misspelled or a
# job key is invalid, the child pipeline fails to create and this job fails.
lint-templates:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      for t in templates/*.yml; do
        echo "Linting $t"
        jq -Rs '{content: ., include_jobs: true}' < "$t" \
          | curl --fail-with-body --silent --request POST \
              --header "PRIVATE-TOKEN: ${LINT_TOKEN}" \
              --header "Content-Type: application/json" \
              --url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/ci/lint" \
              --data @- \
          | jq -e '.valid == true' > /dev/null || { echo "FAILED: $t"; exit 1; }
      done

# Prove the component actually resolves and runs, not just that it parses.
integration:
  stage: test
  trigger:
    include:
      - local: templates/scan.yml
        inputs:
          stage: test
          severity: ''
    strategy: depend

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Publishing $CI_COMMIT_TAG to the CI/CD Catalog"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Vulnetix CI/CD component $CI_COMMIT_TAG"
