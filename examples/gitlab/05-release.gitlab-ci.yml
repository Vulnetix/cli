# Level 5 — Ship the artifacts with a GitLab Release
#
# GitLab differs from GitHub here, and the difference dictates the shape:
#
#   gh release upload   takes a local FILE PATH.
#   release:assets:links  takes a URL. It cannot upload a local file.
#
# So the artifacts must first be published somewhere addressable. The generic
# package registry is the built-in answer, authenticated with CI_JOB_TOKEN.
#
# NOTE: release-cli is deprecated as of GitLab 18.0 and is planned for removal
# in 20.0. The release job below uses the glab image, which is the current
# supported path.

stages:
  - security
  - publish
  - release

variables:
  VULNETIX_VERSION: v3.55.2
  PACKAGE_NAME: vulnetix-artifacts

.vulnetix:
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash ca-certificates curl tar
    - curl -fsSL https://cli.vulnetix.com/install.sh | sh -s -- --install-dir /usr/local/bin --version "$VULNETIX_VERSION"
    - vulnetix auth verify
    - mkdir -p dist

analyze:
  extends: .vulnetix
  stage: security
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - SCAN: sca
        OUT: dist/sbom.cdx.json
        OUT_FLAG: '-o'
      - SCAN: cbom
        OUT: dist/cbom.cdx.json
        OUT_FLAG: '--output-file'
      - SCAN: aibom
        OUT: dist/aibom.cdx.json
        OUT_FLAG: '--output-file'
      - SCAN: license
        OUT: dist/licenses.cdx.json
        OUT_FLAG: ''
      - SCAN: secrets
        OUT: dist/secrets.sarif
        OUT_FLAG: '-o'
  script:
    - |
      if [ -z "$OUT_FLAG" ]; then
        vulnetix "$SCAN"
        cp .vulnetix/sbom.cdx.json "$OUT"
      else
        # A clean secrets scan writes no SARIF. Do not fail the release for it.
        vulnetix "$SCAN" "$OUT_FLAG" "$OUT" || [ "$SCAN" = secrets ]
      fi
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/

# Upload every artifact to the generic package registry so the release can
# link to it by URL.
publish:
  stage: publish
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: analyze
      artifacts: true
  before_script:
    - apk add --no-cache curl ca-certificates
  script:
    - |
      for f in dist/*; do
        [ -e "$f" ] || continue
        echo "Publishing $(basename "$f")"
        curl --fail-with-body --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/$(basename "$f")"
      done

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: publish
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Security artifacts for $CI_COMMIT_TAG. SBOM, CBOM, AIBOM, licenses, secret scan."
    assets:
      links:
        - name: sbom.cdx.json
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/sbom.cdx.json"
          link_type: package
        - name: cbom.cdx.json
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/cbom.cdx.json"
          link_type: package
        - name: aibom.cdx.json
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/aibom.cdx.json"
          link_type: package
        - name: licenses.cdx.json
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/licenses.cdx.json"
          link_type: package
