# Level 4 — Run them in parallel
#
# parallel:matrix is GitLab's analogue of the GitHub Actions job matrix.
# Each combination becomes its own job with its own log.
#
# There is no fail-fast to disable: GitLab already lets sibling matrix jobs
# run to completion when one fails. A failed leg fails the stage.

stages:
  - security

vulnetix:
  stage: security
  image: alpine:3.20
  variables:
    VULNETIX_VERSION: v3.55.2
  parallel:
    matrix:
      - SCAN: sca
        OUT: dist/sbom.cdx.json
        OUT_FLAG: '-o'
      - SCAN: secrets
        OUT: dist/secrets.sarif
        OUT_FLAG: '-o'
      - SCAN: cbom
        OUT: dist/cbom.cdx.json
        OUT_FLAG: '--output-file'
      - SCAN: aibom
        OUT: dist/aibom.cdx.json
        OUT_FLAG: '--output-file'
      # license accepts neither flag; the script special-cases it.
      - SCAN: license
        OUT: dist/licenses.cdx.json
        OUT_FLAG: ''
  before_script:
    - apk add --no-cache bash ca-certificates curl tar
    - curl -fsSL https://cli.vulnetix.com/install.sh | sh -s -- --install-dir /usr/local/bin --version "$VULNETIX_VERSION"
    - vulnetix auth verify
    - mkdir -p dist
  script:
    - |
      if [ -z "$OUT_FLAG" ]; then
        vulnetix "$SCAN"
        cp .vulnetix/sbom.cdx.json "$OUT"
      else
        vulnetix "$SCAN" "$OUT_FLAG" "$OUT"
      fi
  artifacts:
    when: always
    expire_in: 7 days
    name: "vulnetix-$SCAN-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
