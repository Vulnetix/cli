# Level 3 — Publish the result file
#
# Three flags, depending on the command:
#
#   -o / --output      sca, sast, secrets, containers, iac, scan
#                      Repeatable. Takes a path ending .cdx.json or .sarif.
#   --output-file      cbom, aibom, malscan
#                      Single path. -o on these selects the TERMINAL format.
#   (neither)          license
#                      Writes .vulnetix/sbom.cdx.json. Copy it out.
#
# artifacts:when: always keeps the evidence from the run that failed the gate.
# Without it a breached --severity discards the very file you want to read.
#
# TIER NOTE: artifacts:reports:cyclonedx and artifacts:reports:sarif both
# require GitLab Ultimate. On Free and Premium they are ignored — use
# artifacts:paths, which works on every tier.

stages:
  - security

.vulnetix:
  stage: security
  image: alpine:3.20
  variables:
    VULNETIX_VERSION: v3.59.4
  before_script:
    - apk add --no-cache bash ca-certificates curl tar
    - curl -fsSL https://cli.vulnetix.com/install.sh | sh -s -- --install-dir /usr/local/bin --version "$VULNETIX_VERSION"
    - vulnetix auth verify
    - mkdir -p dist

# CycloneDX via -o <path>.
sca:
  extends: .vulnetix
  script:
    - vulnetix sca --severity high -o dist/sbom.cdx.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/sbom.cdx.json
    reports:
      cyclonedx:
        - dist/sbom.cdx.json

# SARIF via -o <path>. A clean scan writes no file, so the artifact upload
# warns rather than fails.
sast:
  extends: .vulnetix
  script:
    - vulnetix sast --severity high -o dist/sast.sarif
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/sast.sarif
    reports:
      sarif: dist/sast.sarif

secrets:
  extends: .vulnetix
  script:
    - vulnetix secrets -o dist/secrets.sarif
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/secrets.sarif

containers:
  extends: .vulnetix
  script:
    - vulnetix containers -o dist/containers.sarif
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/containers.sarif

iac:
  extends: .vulnetix
  script:
    - vulnetix iac -o dist/iac.sarif
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/iac.sarif

# license has no --output-file. Copy the CycloneDX out of .vulnetix/, and
# redirect stdout for the SPDX view.
license:
  extends: .vulnetix
  script:
    - vulnetix license --allow MIT,Apache-2.0,BSD-3-Clause
    - cp .vulnetix/sbom.cdx.json dist/licenses.cdx.json
    - vulnetix license --allow MIT,Apache-2.0,BSD-3-Clause -o json-spdx > dist/licenses.spdx.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/licenses.cdx.json
      - dist/licenses.spdx.json
    reports:
      cyclonedx:
        - dist/licenses.cdx.json

# cbom, aibom and malscan take --output-file, not -o.
cbom:
  extends: .vulnetix
  script:
    - vulnetix cbom --output-file dist/cbom.cdx.json --fail-on quantum-vulnerable
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/cbom.cdx.json
    reports:
      cyclonedx:
        - dist/cbom.cdx.json

aibom:
  extends: .vulnetix
  script:
    - vulnetix aibom --output-file dist/aibom.cdx.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/aibom.cdx.json
    reports:
      cyclonedx:
        - dist/aibom.cdx.json

malscan:
  extends: .vulnetix
  image: node:20-alpine
  script:
    - npm ci
    - vulnetix malscan --output-file dist/malscan.sarif
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/malscan.sarif
